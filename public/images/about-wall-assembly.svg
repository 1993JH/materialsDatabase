<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
    <title id="title">Wall assembly layers illustration</title>
    <desc id="desc">Layered wall diagram with insulation and studs, representing construction assemblies.</desc>
    <defs>
        <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="720" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FDE68A" stop-opacity="0.7"/>
            <stop offset="0.45" stop-color="#67E8F9" stop-opacity="0.6"/>
            <stop offset="1" stop-color="#5EEAD4" stop-opacity="0.65"/>
        </linearGradient>
        <linearGradient id="layerA" x1="0" y1="0" x2="0" y2="520" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#F4F4F5"/>
        </linearGradient>
        <linearGradient id="layerB" x1="0" y1="0" x2="0" y2="520" gradientUnits="userSpaceOnUse">
            <stop stop-color="#ECFEFF"/>
            <stop offset="1" stop-color="#CFFAFE"/>
        </linearGradient>
        <pattern id="insulation" width="22" height="22" patternUnits="userSpaceOnUse">
            <path d="M0 11C5 6 6 5.5 11 11C16 16.5 17 16 22 11" stroke="#0F766E" stroke-opacity="0.35" stroke-width="1.4"/>
            <path d="M0 0L22 22" stroke="#0E7490" stroke-opacity="0.2" stroke-width="1"/>
        </pattern>
        <filter id="soft" x="0" y="0" width="1200" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="20"/>
        </filter>
    </defs>

    <rect width="1200" height="800" rx="36" fill="#F8FAFC"/>
    <g filter="url(#soft)">
        <ellipse cx="350" cy="170" rx="180" ry="90" fill="#F59E0B" fill-opacity="0.22"/>
        <ellipse cx="950" cy="160" rx="180" ry="90" fill="#06B6D4" fill-opacity="0.22"/>
        <ellipse cx="780" cy="670" rx="240" ry="100" fill="#14B8A6" fill-opacity="0.2"/>
    </g>
    <rect x="80" y="70" width="1040" height="660" rx="30" fill="url(#bg)"/>

    <g transform="translate(240 145)">
        <rect x="0" y="0" width="720" height="520" rx="20" fill="#0F172A" fill-opacity="0.08"/>

        <rect x="42" y="35" width="90" height="450" rx="8" fill="url(#layerA)" stroke="#D4D4D8"/>
        <rect x="136" y="35" width="18" height="450" fill="#A1A1AA" fill-opacity="0.75"/>

        <rect x="162" y="35" width="206" height="450" rx="8" fill="url(#layerB)" stroke="#A5F3FC"/>
        <rect x="171" y="50" width="188" height="420" rx="6" fill="url(#insulation)"/>

        <rect x="376" y="35" width="16" height="450" fill="#A16207" fill-opacity="0.6"/>
        <rect x="420" y="35" width="16" height="450" fill="#A16207" fill-opacity="0.6"/>
        <rect x="464" y="35" width="16" height="450" fill="#A16207" fill-opacity="0.6"/>
        <rect x="508" y="35" width="16" height="450" fill="#A16207" fill-opacity="0.6"/>
        <rect x="552" y="35" width="16" height="450" fill="#A16207" fill-opacity="0.6"/>

        <rect x="396" y="35" width="200" height="450" rx="8" fill="#FFFBEB" fill-opacity="0.7" stroke="#FDE68A"/>
        <rect x="606" y="35" width="90" height="450" rx="8" fill="#FAFAFA" stroke="#D4D4D8"/>

        <path d="M44 505H694" stroke="#27272A" stroke-opacity="0.28" stroke-width="5" stroke-linecap="round"/>
    </g>
</svg>
